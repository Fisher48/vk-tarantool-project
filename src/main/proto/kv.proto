syntax = "proto3";

option java_package = "ru.fisher.grpc";
option java_multiple_files = true;

service KvService {
  rpc Put (PutRequest) returns (PutResponse);
  rpc Get (GetRequest) returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc Range (RangeRequest) returns (stream RangeResponse);
  rpc Count (Empty) returns (CountResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {
  bool success = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message RangeRequest {
  string from = 1;
  string to = 2;
}

message RangeResponse {
  string key = 1;
  bytes value = 2;
}

message CountResponse {
  int64 count = 1;
}

message Empty {}